  <g transform="translate(890 510)">
    <path d="M0 0h194v64H0z" fill="#fff" fill-opacity=".78" stroke="#22303a" stroke-opacity=".48"/>
    <text x="14" y="24" fill="#22303a" font-family="Arial, sans-serif" font-size="12" font-weight="700" letter-spacing="1.5">BASE CAMP</text>
    <text x="14" y="46" fill="#2c5d88" font-family="Arial, sans-serif" font-size="14">aaronellis.dev</text>
