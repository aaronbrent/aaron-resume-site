  <g fill="#22303a" font-family="Arial, sans-serif">
    <text x="72" y="104" font-size="18" font-weight="700" letter-spacing="3">AARON ELLIS</text>
    <text x="72" y="132" font-size="14" letter-spacing="1.5">STAFF FULL-STACK ENGINEER</text>
    <text x="72" y="540" font-size="13" letter-spacing="1.5">TRAIL MAP · SEASONS 2014–2026</text>
    <text x="72" y="566" font-size="14">TypeScript · React · Node · consumer fintech</text>
