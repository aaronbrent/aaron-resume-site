name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format

      - name: Unit tests
        run: pnpm test

      - name: Trail validation (§2)
        run: pnpm trail:validate

      - name: Build (static prerender)
        run: pnpm build

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: ""
          PLAYWRIGHT_BROWSERS_PATH: ~/.cache/ms-playwright

      - name: E2E + axe
        run: pnpm test:e2e
        env:
          PLAYWRIGHT_BROWSERS_PATH: ~/.cache/ms-playwright

      - name: Lighthouse CI (budgets)
        run: pnpm lighthouse

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  # Cloudflare Pages deploy. Requires two repository secrets:
  #   CLOUDFLARE_API_TOKEN  (Pages:Edit permission)
  #   CLOUDFLARE_ACCOUNT_ID
  # Until those are set, the deploy job runs a no-op credential check and skips
  # deployment steps. Preview deploys per-PR come free once the Pages project is
  # connected (project name: aaronellis-trail-map).
  deploy:
    needs: checks
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Detect Cloudflare credentials
        id: cloudflare
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -n "$CLOUDFLARE_API_TOKEN" ] && [ -n "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Cloudflare credentials are not configured; skipping deploy."
          fi

      - name: Checkout
        if: steps.cloudflare.outputs.enabled == 'true'
        uses: actions/checkout@v4

      - name: Set up pnpm
        if: steps.cloudflare.outputs.enabled == 'true'
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node
        if: steps.cloudflare.outputs.enabled == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        if: steps.cloudflare.outputs.enabled == 'true'
        run: pnpm install --frozen-lockfile

      - name: Build
        if: steps.cloudflare.outputs.enabled == 'true'
        run: pnpm build

      - name: Deploy to Cloudflare Pages
        if: steps.cloudflare.outputs.enabled == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy build/client --project-name=aaronellis-trail-map
